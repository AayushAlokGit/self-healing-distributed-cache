# Render Blueprint — the BACKEND only. The dashboard deploys separately; see README, "Deploy".
services:
  - type: web
    name: self-healing-cache-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile

    # GET / returns a 200 service hint (cmd/server/server.go), so there is nothing extra to build.
    healthCheckPath: /

    envVars:
      # Push a notification when somebody opens the dashboard (notify/, cmd/server/visits.go).
      # Unset = the feature is off.
      #
      # ⚠️ sync: false means Render prompts for this value and it never enters the repo. An ntfy
      # topic has no password — anyone who learns the name can read your notifications AND send
      # you some. Long random string; never a VITE_* var (those are inlined into the JS bundle).
      - key: NTFY_TOPIC
        sync: false

    # ⚠️ PORT is deliberately unset: Render injects it and defaultAddr() reads it. Pinning it
    # would be a second source of truth that can disagree.
    #
    # ⚠️ Free plan sleeps after ~15 min idle and TERMINATES the process, so the cache is wiped
    # and re-seeds on boot. The dashboard shows "waking the cluster" rather than an error.
